{% extends "base.html" %}

{% block conteudo %}
  <h1>📚 Registrar Empréstimo de Livro</h1>
  
  <div class="card-form">
    <form action="/emprestar" method="POST">
      
      <div class="form-group">
        <label for="livro_id">Selecione o Livro Disponível:</label>
        <select name="livro_id" id="livro_id" required>
          <option value="" disabled selected>-- Escolha um livro --</option>
          {% for livro in livros %}
            <option value="{{ livro[0] }}">{{ livro[1] }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="nome_aluno">Nome do Aluno:</label>
        <input type="text" name="nome_aluno" id="nome_aluno" placeholder="Digite o nome completo" required>
      </div>

      <div class="form-buttons">
        <button type="submit" class="btn-sucesso">Confirmar Empréstimo</button>
        <a href="/emprestimos" class="btn-cancelar">Cancelar</a>
      </div>

    </form>
  </div>
{% endblock %}
