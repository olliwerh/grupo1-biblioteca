{% extends "base.html" %}
{% block conteudo %}
  <h1>➕ Cadastrar Livro</h1>
  <form method="POST">
    <label>Título</label>
    <input type="text" name="titulo" required>

    <label>Autor</label>
    <input type="text" name="autor" required>

    <label>Ano de publicação</label>
    <input type="number" name="ano" required>

    <button type="submit">Cadastrar</button>
  </form>
{% endblock %}
